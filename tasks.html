<!DOCTYPE html>
<html>
    <head>
        <title>Tasks</title>
        <link rel="stylesheet" href="taskpage.css">
    </head>
    <body>
        <h1>Welcome to your Tasks</h1>
        <div class="taskboard">
            <div class="task">
                <form id="taskcreate">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title"><br>
                    <label for="desc">Description</label>
                    <input type="text" id="desc" name="description"><br>
                    <input type="submit" value="Submit">
                </form>
                <p id="output"></p>
            </div>
            <div id="task-container">
                
            </div>
        </div>
        <script>
            document.getElementById("taskcreate").addEventListener("submit", function (event) {
                event.preventDefault();
                document.getElementById('output').style.color = "orange"
                document.getElementById('output').innerText = "Sending information to server..."
                const form = event.target
                const formdata = new FormData(form)
                const data = Object.fromEntries(formdata.entries())
                console.log(data)
                fetch('https://schedule-xnnb.onrender.com/api/newtask', {method: "POST", headers: {'Content-Type':'application/json'}, body: JSON.stringify(data), credentials: "include"})
                .then(response => {
                    if (response.status === 200){
                        document.getElementById('output').style.color = "green"
                    } else {
                        document.getElementById("output").style.color = "red"
                    }
                    return response.json()
                })
                .then(result => {
                    console.log(result.session_data);
                    document.getElementById('output').innerText = result.message;
                    form.reset();
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('output').innerText = error.message;
                });
            })
            async function retrievetasks(){
                const response = await fetch("https://schedule-xnnb.onrender.com/api/gettasks", {credentials: "include"})

                const tasks = await response.json()
                console.log(tasks)
                loadtasks(tasks);
            }
            function loadtasks(tasksArray){
                const container = document.getElementById("task-container")
                container.innerHTML = "";
                console.log(tasksArray)
                if (tasksArray.length == 0) {
                    container.innerHTML = "<p>You don't have any existing tasks</p>"
                    return;
                }
                tasksArray.forEach(task => {
                    const taskcard = document.createElement('div')
                    taskcard.className = 'task-card'
                    const title = document.createElement('h3')
                    title.innerText = task.title
                    const desc = document.createElement("p")
                    desc.innerText = task.description
                    const dltbut = document.createElement("button")
                    dltbut.innerText = "Delete Task"
                    dltbut.onclick = () => deletetask(task._id, taskcard)
                    taskcard.appendChild(title)
                    taskcard.appendChild(desc)
                    taskcard.appendChild(dltbut)
                    container.appendChild(taskcard)
                });
            }
            async function deletetask(id, card) {
                if (!confirm("Are you sure you want to delete the task")) return;
                try {
                    const response = await fetch(`https://schedule-xnnb.onrender.com/api/task/${id}`, {method: "DELETE", credentials:"include"})
                    if (response.ok) {
                        card.remove();
                        alert("Task Succesfully Deleted");
                    } else {
                        alert("Task not succesfully deleted, Try again or contact Admin")
                    }
                } catch (error) {
                    console.error(error)
                }
            }
            window.onload = retrievetasks
        </script>
    </body>
</html>
